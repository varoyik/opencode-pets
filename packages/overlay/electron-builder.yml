appId: com.opencode-pets.overlay
productName: opencode-pets-overlay
directories:
  output: dist-build
files:
  - dist/**
  - assets/**
  - package.json
mac:
  target:
    - target: dir
      arch:
        - arm64
        - x64
win:
  target:
    - target: dir
      arch:
        - x64
linux:
  target:
    - target: dir
      arch:
        - x64
        - arm64
  executableName: opencode-pets-overlay

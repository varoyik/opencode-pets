name: Release
on:
  push:
    tags: [v*]
permissions:
  contents: read
jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            os: macos-latest
            platform: mac
            arch: arm64
            ext: tar.gz
          - target: darwin-x64
            os: macos-latest
            platform: mac
            arch: x64
            ext: tar.gz
          - target: linux-x64
            os: ubuntu-latest
            platform: linux
            arch: x64
            ext: tar.gz
          - target: linux-arm64
            os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            ext: tar.gz
          - target: win32-x64
            os: windows-latest
            platform: win
            arch: x64
            ext: zip
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build shared core
        run: bunx tsc --build packages/core
      - name: Build overlay
        working-directory: packages/overlay
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          bun run build
          bunx electron-builder \
            --${{ matrix.platform }} \
            --${{ matrix.arch }} \
            --dir \
            --config electron-builder.yml
      - name: Compress (Linux)
        if: matrix.platform == 'linux'
        working-directory: packages/overlay
        run: |
          LINUX_DIR=$(ls -d dist-build/linux* | head -1)
          tar -czf "overlay-${{ matrix.target }}.tar.gz" -C "$LINUX_DIR" .
      - name: Compress (macOS)
        if: matrix.platform == 'mac'
        working-directory: packages/overlay
        run: |
          MAC_DIR=$(ls -d dist-build/mac* | head -1)
          tar -czf "overlay-${{ matrix.target }}.tar.gz" -C "$MAC_DIR" .
      - name: Compress (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        working-directory: packages/overlay
        run: |
          Set-Location dist-build/win-unpacked
          Compress-Archive -Path * -DestinationPath "../../overlay-${{ matrix.target }}.zip"
      - name: Generate checksum (Linux)
        if: matrix.platform == 'linux'
        working-directory: packages/overlay
        run: sha256sum "overlay-${{ matrix.target }}.${{ matrix.ext }}" > "overlay-${{ matrix.target }}.${{ matrix.ext }}.sha256"
      - name: Generate checksum (macOS)
        if: matrix.platform == 'mac'
        working-directory: packages/overlay
        run: shasum -a 256 "overlay-${{ matrix.target }}.${{ matrix.ext }}" > "overlay-${{ matrix.target }}.${{ matrix.ext }}.sha256"
      - name: Generate checksum (Windows)
        if: matrix.platform == 'win'
        shell: bash
        working-directory: packages/overlay
        run: sha256sum "overlay-${{ matrix.target }}.${{ matrix.ext }}" > "overlay-${{ matrix.target }}.${{ matrix.ext }}.sha256"
      - name: Move artifacts to root
        run: mv packages/overlay/overlay-${{ matrix.target }}.${{ matrix.ext }}* .
      - uses: actions/upload-artifact@v4
        with:
          name: overlay-${{ matrix.target }}
          path: overlay-${{ matrix.target }}.${{ matrix.ext }}*
          if-no-files-found: error
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: overlay-*
          merge-multiple: true
      - name: Combine checksums
        run: cat *.sha256 > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            overlay-*.tar.gz
            overlay-*.zip
            checksums.txt
          generate_release_notes: true
  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Publish to npm
        working-directory: packages/plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
          npm publish
